<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Swami Holiday Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f1ea; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #0a4d4c; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card i { font-size: 2rem; color: #ff8a7a; }
        .stat-card h3 { font-size: 1.8rem; color: #0a4d4c; }
        .filter-bar { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .filter-bar input, .filter-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background: #ff8a7a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-excel { background: #4caf50; }
        table { width: 100%; background: white; border-radius: 12px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #0a4d4c; color: white; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        canvas { max-height: 300px; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-bar { flex-direction: column; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Reports & Analytics</h1>
            <p>Revenue reports and booking analytics</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-rupee-sign"></i>
                <h3 id="totalRevenue">₹0</h3>
                <p>Total Revenue</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <h3 id="totalBookings">0</h3>
                <p>Total Bookings</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3 id="totalGuests">0</h3>
                <p>Total Guests</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-building"></i>
                <h3 id="occupancyRate">0%</h3>
                <p>Occupancy Rate</p>
            </div>
        </div>

        <div class="filter-bar">
            <label>From Date:</label>
            <input type="date" id="fromDate">
            <label>To Date:</label>
            <input type="date" id="toDate">
            <button class="btn" onclick="loadReports()"><i class="fas fa-search"></i> Apply Filter</button>
            <button class="btn btn-excel" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export to Excel</button>
        </div>

        <div class="chart-container">
            <h3><i class="fas fa-chart-bar"></i> Daily Revenue</h3>
            <canvas id="revenueChart"></canvas>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Booking ID</th><th>Guest</th><th>Room</th><th>Check-in</th><th>Check-out</th><th>Amount</th><th>Payment</th><th>Status</th></tr>
                </thead>
                <tbody id="reportsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let revenueChart = null;

        async function loadReports() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            
            let url = `${API_BASE_URL}/bookings`;
            if (fromDate && toDate) {
                url += `?from=${fromDate}&to=${toDate}`;
            }
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                const bookings = data.bookings || [];
                
                const paidBookings = bookings.filter(b => b.payment_status === 'paid');
                const totalRevenue = paidBookings.reduce((sum, b) => sum + b.total_amount, 0);
                const totalGuests = bookings.reduce((sum, b) => sum + (b.guests || 2), 0);
                
                document.getElementById('totalRevenue').innerHTML = `₹${totalRevenue.toLocaleString()}`;
                document.getElementById('totalBookings').innerHTML = bookings.length;
                document.getElementById('totalGuests').innerHTML = totalGuests;
                
                const uniqueDates = [...new Set(bookings.map(b => b.check_in))];
                const occupancyRate = Math.min(100, Math.round((bookings.length / (uniqueDates.length * 4)) * 100));
                document.getElementById('occupancyRate').innerHTML = `${isNaN(occupancyRate) ? 0 : occupancyRate}%`;
                
                // Build table HTML - NO Js( anywhere!
                let tableHtml = '';
                for (const b of bookings) {
    let statusHtml = '';
    
    // Check CANCELLED first (so it doesn't get caught by completed)
    if (b.status === 'cancelled') {
        if (b.payment_status === 'paid' && b.payment_method === 'razorpay') {
            statusHtml = '<span style="color:#ff9800;">Refunded</span>';
        } else {
            statusHtml = '<span style="color:#f44336;">Cancelled</span>';
        }
    } 
    else if (b.status === 'completed') {
        statusHtml = '<span style="color:#4caf50;">Completed</span>';
    } 
    else if (b.status === 'confirmed' && b.payment_status === 'paid') {
        statusHtml = '<span style="color:#4caf50;">Paid ✓</span>';
    } 
    else if (b.status === 'confirmed') {
        statusHtml = '<span style="color:#ff9800;">Pending</span>';
    }
    else {
        statusHtml = '<span style="color:#ff9800;">Pending</span>';
    }
                    
                    tableHtml += '<tr>';
                    tableHtml += '<td>' + b.booking_id + '</td>';
                    tableHtml += '<td>' + b.guest_name + '</td>';
                    tableHtml += '<td>Room ' + (b.room_number || b.room_id) + '</td>';
                    tableHtml += '<td>' + new Date(b.check_in).toLocaleDateString() + '</td>';
                    tableHtml += '<td>' + new Date(b.check_out).toLocaleDateString() + '</td>';
                    tableHtml += '<td>₹' + b.total_amount + '</td>';
                    tableHtml += '<td>' + (b.payment_method === 'razorpay' ? 'Razorpay' : 'Pay at Venue') + '</td>';
                    tableHtml += '<td>' + statusHtml + '</td>';
                    tableHtml += '</tr>';
                }
                
                document.getElementById('reportsTable').innerHTML = tableHtml || '<tr><td colspan="8">No bookings found</td></tr>';
                updateChart(bookings);
                
            } catch (error) {
                console.error('Error loading reports:', error);
                document.getElementById('reportsTable').innerHTML = '<tr><td colspan="8">Error loading reports</td></tr>';
            }
        }

        function updateChart(bookings) {
            const dailyRevenue = {};
            bookings.forEach(b => {
                if (b.payment_status === 'paid') {
                    const date = new Date(b.check_in).toLocaleDateString();
                    dailyRevenue[date] = (dailyRevenue[date] || 0) + b.total_amount;
                }
            });
            
            const labels = Object.keys(dailyRevenue);
            const data = Object.values(dailyRevenue);
            
            if (revenueChart) revenueChart.destroy();
            
            const ctx = document.getElementById('revenueChart').getContext('2d');
            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Revenue (₹)', data: data, backgroundColor: '#ff8a7a' }] },
                options: { responsive: true, scales: { y: { beginAtZero: true, title: { display: true, text: 'Revenue (₹)' } } } }
            });
        }

        function exportToExcel() {
            const rows = document.querySelectorAll('#reportsTable tr');
            let csv = [];
            csv.push(['Booking ID', 'Guest', 'Room', 'Check-in', 'Check-out', 'Amount', 'Payment', 'Status'].join(','));
            rows.forEach(row => {
                const cols = row.querySelectorAll('td');
                const rowData = Array.from(cols).map(col => '"' + col.innerText + '"');
                csv.push(rowData.join(','));
            });
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bookings_report_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        const today = new Date();
        const lastMonth = new Date();
        lastMonth.setDate(lastMonth.getDate() - 30);
        document.getElementById('fromDate').value = lastMonth.toISOString().split('T')[0];
        document.getElementById('toDate').value = today.toISOString().split('T')[0];
        
        loadReports();
    </script>
</body>
</html>
